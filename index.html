<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radar Duel • Solo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0A0E1A;
            --bg-deep: #060811;
            --panel: #121A2E;
            --panel-2: #1A243D;
            --line: #243155;
            --amber: #F4A340;
            --cyan: #5EEAD4;
            --text: #EDEFF5;
            --muted: #8B93A7;
            --good: #4ADE80;
            --bad: #F76E6E;
            --radius: 16px;
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
        body { background: radial-gradient(ellipse at 50% -15%, #101a33 0%, var(--bg) 60%, var(--bg-deep) 100%); color: var(--text); min-height: 100vh; }
        h1, h2 { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        .app { max-width: 620px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; position: sticky; top: 0; z-index: 100; background: rgba(10, 14, 26, 0.96); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
        .brand { display: flex; align-items: center; gap: 9px; }
        .brand-mark { width: 30px; height: 30px; border: 2px solid var(--cyan); border-radius: 50%; position: relative; }
        .brand-mark::after { content: ""; position: absolute; left: 50%; top: 4px; width: 2px; height: 11px; background: var(--cyan); transform: translateX(-50%); animation: sweep 3.5s linear infinite; }
        @keyframes sweep { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg); } }
        .brand-text .t1 { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
        .brand-text .t2 { font-size: 9.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

        .score-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 5px 14px; display: flex; align-items: center; gap: 7px; font-size: 13px; }
        .score-pill .val { font-weight: 700; font-size: 19px; color: var(--amber); font-family: 'Space Grotesk', sans-serif; }

        main { flex: 1; padding: 0 16px 30px; }

        .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
        .eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--cyan); font-weight: 600; margin-bottom: 2px; }
        .page-title { font-size: 22px; font-weight: 700; margin: 0 0 6px; line-height: 1.15; }

        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 13px 18px; border-radius: 12px; border: none; font-weight: 600; font-size: 14.5px; width: 100%; transition: .1s; }
        .btn:active { transform: scale(0.985); }
        .btn-primary { background: var(--amber); color: #1a1200; }
        .btn-cyan { background: var(--cyan); color: #04211c; }
        .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text); }
        .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
        .btn-sm { padding: 8px 13px; font-size: 13px; width: auto; }

        .status { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); margin: 6px 0; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex: none; }
        .dot.live { background: var(--good); box-shadow: 0 0 5px var(--good); }
        .dot.err { background: var(--bad); }

        #map { height: 400px; width: 100%; border-radius: var(--radius); margin: 8px auto 6px; }

        .plane-list { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
        .plane-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 11px 13px; display: flex; align-items: center; gap: 11px; cursor: pointer; }
        .plane-card:active { background: #1f2a44; }
        .plane-card .dir-badge { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--cyan-dim); flex: none; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--cyan); font-weight: 700; }
        .plane-card .info { flex: 1; min-width: 0; }
        .plane-card .callsign { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; letter-spacing: .02em; }
        .plane-card .meta { font-size: 12.5px; color: var(--muted); margin-top: 1px; line-height: 1.25; }
        .plane-card .alt { font-weight: 600; color: #a5b4fc; }

        .empty-note { text-align: center; padding: 22px 12px; color: var(--muted); font-size: 13px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <div class="brand-mark"></div>
                <div class="brand-text">
                    <div class="t1">Radar Duel</div>
                    <div class="t2">SOLO • EN DIRECT</div>
                </div>
            </div>
            <div class="score-pill">
                <span>Score</span>
                <span id="scoreVal" style="font-weight:700;color:#F4A340;font-size:18px">0</span>
            </div>
        </div>
        <main>
            <div id="screen-radar" class="screen">
                <div class="card">
                    <div class="eyebrow">MANCHE <span id="round">1</span></div>
                    <h1 class="page-title">Avions au-dessus de toi</h1>
                    <div id="map"></div>
                    <div class="status" id="fetchStatus">
                        <span class="dot"></span>
                        <span id="fetchText">Chargement...</span>
                    </div>
                    <div class="plane-list" id="planeList"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        (function() {
            "use strict";

            const STORAGE = "radarDuelSolo_v7_fixed";
            let state = { score: 0, round: 0, loc: null, planes: [], selected: null, history: [] };

            function load() {
                try { const s = localStorage.getItem(STORAGE); if (s) state = Object.assign(state, JSON.parse(s)); } catch (e) {}
            }
            function save() { try { localStorage.setItem(STORAGE, JSON.stringify(state)); } catch (e) {} }
            load();

            function updateScore() {
                document.getElementById('scoreVal').textContent = state.score;
            }
            updateScore();

            function showScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
                document.getElementById(id).style.display = 'block';
                window.scrollTo(0, 0);
            }

            function escape(s) { return (s || "").replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])); }

            // Initialize the map
            const map = L.map('map').setView([51.505, -0.09], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Function to fetch planes and update the map
            async function fetchPlanes() {
                if (!state.loc) return;

                const { lat, lon } = state.loc;
                map.setView([lat, lon], 13);

                document.getElementById('planeList').innerHTML = '';
                setStatus("Recherche des avions...");

                try {
                    const data = await safeFetch(`https://api.adsb.lol/v2/point/${lat}/${lon}/55`);
                    const planes = parseADSB(data, lat, lon)
                        .filter(p => p.distKm && p.distKm < 100)
                        .sort((a, b) => a.distKm - b.distKm)
                        .slice(0, 20);

                    state.planes = planes;
                    save();

                    if (planes.length) {
                        setStatus(`${planes.length} avions détectés`, true);
                        renderMap(planes);
                        renderList(planes);
                    } else {
                        setStatus("Aucun avion trouvé", false);
                        document.getElementById('planeList').innerHTML = `<div class="empty-note">Aucun avion détecté dans la zone.</div>`;
                    }
                } catch (e) {
                    setStatus("Erreur de chargement", false);
                }
            }

            function parseADSB(data, oLat, oLon) {
                const ac = data.ac || data.aircraft || [];
                return ac.map(a => {
                    const cs = (a.flight || a.callsign || "").trim();
                    const alt = a.alt_baro;

                    if (!cs || cs.length < 3 || alt === "ground" || (typeof alt === 'number' && alt < 6000)) return null;

                    let dk = null;
                    let br = null;

                    if (typeof a.lat === 'number' && typeof a.lon === 'number') {
                        dk = distKm(oLat, oLon, a.lat, a.lon);
                        br = bearing(oLat, oLon, a.lat, a.lon);
                    } else if (typeof a.dst === 'number' && typeof a.dir === 'number') {
                        dk = a.dst * 1.852;
                        br = a.dir;
                    }

                    if (dk === null || br === null) return null;

                    return {
                        callsign: cs.replace(/\s+$/, ''),
                        alt: alt,
                        track: a.track || a.true_heading || null,
                        speed: a.gs || null,
                        distKm: dk,
                        bearing: br,
                        lat: a.lat,
                        lon: a.lon
                    };
                }).filter(Boolean);
            }

            function distKm(la1, lo1, la2, lo2) {
                const R = 6371, dLat = rad(la2 - la1), dLo = rad(lo2 - lo1);
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(rad(la1)) * Math.cos(rad(la2)) * Math.sin(dLo / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function rad(d) { return d * Math.PI / 180; }

            function bearing(la1, lo1, la2, lo2) {
                const y = Math.sin(rad(lo2 - lo1)) * Math.cos(rad(la2));
                const x = Math.cos(rad(la1)) * Math.sin(rad(la2)) - Math.sin(rad(la1)) * Math.cos(rad(la2)) * Math.cos(rad(lo2 - lo1));
                return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            }

            function dirLabel(b) { return ["N", "NE", "E", "SE", "S", "SO", "O", "NO"][Math.round(b / 45) % 8]; }

            function renderMap(planes) {
                map.eachLayer(layer => {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });

                planes.forEach(p => {
                    if (p.lat && p.lon) {
                        const marker = L.marker([p.lat, p.lon]).addTo(map);
                        marker.bindPopup(`<b>${escape(p.callsign)}</b><br>Altitude: ${Math.round(p.alt)} ft<br>Distance: ${p.distKm.toFixed(1)} km`);
                    }
                });
            }

            function renderList(planes) {
                const wrap = document.getElementById('planeList');
                if (!planes.length) {
                    wrap.innerHTML = `<div class="empty-note">Aucun avion correspondant.</div>`;
                    return;
                }

                wrap.innerHTML = planes.map((p, i) => `
                    <div class="plane-card" data-idx="${i}">
                        <div class="dir-badge" style="transform:rotate(${p.track || p.bearing || 0}deg)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2 L18 20 L12 16 L6 20 Z"/></svg>
                        </div>
                        <div class="info">
                            <div class="callsign">${escape(p.callsign)}</div>
                            <div class="meta">
                                <span class="alt">${Math.round(p.alt).toLocaleString('fr')} ft</span> •
                                ${p.distKm.toFixed(1)} km • ${dirLabel(p.bearing)}
                                ${p.speed ? ' • ' + Math.round(p.speed) + ' kt' : ''}
                            </div>
                        </div>
                    </div>
                `).join('');

                wrap.querySelectorAll('.plane-card').forEach(card => {
                    card.onclick = () => {
                        const idx = parseInt(card.dataset.idx);
                        selectPlane(planes[idx]);
                    };
                });
            }

            function selectPlane(p) {
                state.selected = p;
                save();
                // Add your logic to handle the selected plane
            }

            function setStatus(msg, live = true) {
                const dot = document.querySelector('#fetchStatus .dot');
                document.getElementById('fetchText').textContent = msg;
                dot.className = 'dot ' + (live ? 'live' : 'err');
            }

            async function safeFetch(url) {
                const proxies = [
                    u => u,
                    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
                    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
                ];
                for (let i = 0; i < proxies.length; i++) {
                    try {
                        const r = await fetch(proxies[i](url), { headers: { Accept: 'application/json' } });
                        if (r.ok) return await r.json();
                    } catch (e) {}
                }
                throw new Error("Réseau indisponible");
            }

            // Initialize the app
            function init() {
                updateScore();
                if (state.loc && state.round > 0) {
                    document.getElementById('round').textContent = state.round;
                    showScreen('screen-radar');
                    fetchPlanes();
                } else {
                    showScreen('screen-loc');
                }
            }

            init();
        })();
    </script>
</body>
</html>
